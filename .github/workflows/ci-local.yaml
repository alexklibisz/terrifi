name: CI - Local

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  main:
    name: Main
    runs-on:
      - self-hosted
      - terrifi
    env:
      TF_ACC_TERRAFORM_PATH: /usr/bin/tofu
      TF_ACC_PROVIDER_HOST: registry.opentofu.org
    steps:
      - name: Checkout
        timeout-minutes: 1
        uses: actions/checkout@v4
      - name: Cache Go modules and build cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-${{ hashFiles('go.sum') }}-
            go-
      - name: Download Go dependencies
        timeout-minutes: 10
        run: task deps
      - name: Build
        timeout-minutes: 10
        run: task build
      - name: Format check
        timeout-minutes: 1
        run: task fmt
      - name: Unit tests
        timeout-minutes: 5
        run: task test:unit
      - name: Acceptance tests (Docker)
        timeout-minutes: 10
        run: task test:acc
      - name: GoReleaser dry run
        timeout-minutes: 5
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --snapshot --clean
