name: CI - HIL

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    - cron: '22 * * * *'

jobs:
  main:
    name: Main
    runs-on:
      - self-hosted
      - terrifi
    env:
      # Using IP instead of hostname for reliability in the self-hosted runner.
      UNIFI_API: https://192.168.1.3:11443
      UNIFI_API_KEY: ${{ secrets.TERRIFI_HIL_TEST_UNIFI_API_KEY }}
      UNIFI_INSECURE: true
      TF_ACC_TERRAFORM_PATH: /usr/bin/tofu
      TF_ACC_PROVIDER_HOST: registry.opentofu.org
    steps:
      - name: Checkout
        timeout-minutes: 1
        uses: actions/checkout@v4
      - name: Cache Go modules
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: /go/pkg/mod
          key: gomod-${{ hashFiles('go.sum') }}
          restore-keys: gomod-
      - name: Check UniFi API key
        timeout-minutes: 1
        run: task checkAPIConnection
      - name: Download Go dependencies
        timeout-minutes: 10
        run: task deps
      - name: Build
        timeout-minutes: 10
        run: task build
      - name: Acceptance tests (HIL)
        timeout-minutes: 10
        run: task test:acc:hardware
